name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-build
  cancel-in-progress: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  FRONTEND_REPO: reshma-frontend-repository
  BACKEND_REPO: reshma-backend-repository

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Make Build Script Executable
        run: chmod +x scripts/build.sh

      - name: Build and Push Images
        run: |
          ./scripts/build.sh \
            "${{ github.sha }}" \
            "${{ secrets.AWS_REGION }}" \
            "${{ secrets.AWS_ACCOUNT_ID }}" \
            "${{ env.FRONTEND_REPO }}" \
            "${{ env.BACKEND_REPO }}"

      - name: Verify Images
        run: |
          aws ecr list-images --repository-name $FRONTEND_REPO
          aws ecr list-images --repository-name $BACKEND_REPO

      - name: Upload Compose File to S3
        run: |
          aws s3 cp \
            docker-compose.deploy.yml \
            s3://${{ secrets.S3_BUCKET_NAME }}/docker-compose.deploy.yml

      - name: Upload Deploy Script to S3
        run: |
          aws s3 cp \
            scripts/deploy.sh \
            s3://${{ secrets.S3_BUCKET_NAME }}/deploy.sh

      - name: Show Summary
        run: |
          echo "Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "SHA Tag: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Stable Tag: stable" >> $GITHUB_STEP_SUMMARY
          echo "Compose file uploaded to S3" >> $GITHUB_STEP_SUMMARY
          echo "Deploy script uploaded to S3" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws s3 cp \
              s3://${{ secrets.S3_BUCKET_NAME }}/deploy.sh \
              /home/ubuntu/deploy.sh

            chmod +x /home/ubuntu/deploy.sh

            /home/ubuntu/deploy.sh \
              "${{ github.sha }}" \
              "${{ secrets.AWS_REGION }}" \
              "${{ secrets.AWS_ACCOUNT_ID }}" \
              "${{ secrets.S3_BUCKET_NAME }}"

      - name: Deployment Summary
        run: |
          echo "Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "Image Tag: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Docker Compose updated from S3" >> $GITHUB_STEP_SUMMARY